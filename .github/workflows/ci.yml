name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Run Cypress UI tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm run preview -- --host 127.0.0.1 --port 5173 --strictPort
          wait-on: "http://127.0.0.1:5173"
          wait-on-timeout: 120
          command: npm run cypress:run:ui

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7
